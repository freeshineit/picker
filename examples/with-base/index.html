<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Picker with-base Demo</title>
    <link rel="stylesheet" href="./common.css" />
    <link rel="stylesheet" href="./style/css.css" />
  </head>
  <body>
    <div class="demo-page">
      <h2>Picker with-base Demo</h2>

      <div class="control-panel">
        <label>
          placement
          <select id="placement">
            <option value="top">top</option>
            <option value="tl">tl</option>
            <option value="tr">tr</option>
            <option value="bottom" selected>bottom</option>
            <option value="bl">bl</option>
            <option value="br">br</option>
          </select>
        </label>

        <label>
          trigger
          <select id="trigger">
            <option value="click" selected>click</option>
            <option value="hover">hover</option>
          </select>
        </label>

        <label>
          offsetX
          <input id="offsetX" type="number" value="0" />
        </label>

        <label>
          offsetY
          <input id="offsetY" type="number" value="8" />
        </label>

        <label class="check-item">
          <input id="triggerClose" type="checkbox" />
          triggerClose
        </label>

        <label class="check-item">
          <input id="isMobile" type="checkbox" />
          isMobile
        </label>

        <label class="check-item">
          <input id="disabled" type="checkbox" />
          disabled
        </label>
      </div>

      <label class="content-label">
        panel html
        <textarea id="contentHtml" rows="4"><div><strong>Picker Content</strong><p>You can edit this HTML in the textarea.</p></div></textarea>
      </label>

      <div class="button-row">
        <button id="btnRebuild">Rebuild</button>
        <button id="btnOpen">Open</button>
        <button id="btnClose">Close</button>
        <button id="btnToggle">Toggle</button>
        <button id="btnUpdate">Update Content</button>
        <button id="btnDestroy">Destroy</button>
      </div>

      <div class="preview-area">
        <button id="pickerTarget" class="target-btn">Open Picker</button>
        <div class="state">
          <span id="stateReady">picker: destroyed</span>
          <span id="stateOpen">open: false</span>
        </div>
      </div>

      <div class="log-panel">
        <div class="log-title">event log</div>
        <ul id="logList"></ul>
      </div>
    </div>

    <script src="./index.umd.js"></script>
    <script>
      (function () {
        var picker = null;
        var pickerOpen = false;
        var logs = [];

        var els = {
          placement: document.getElementById("placement"),
          trigger: document.getElementById("trigger"),
          offsetX: document.getElementById("offsetX"),
          offsetY: document.getElementById("offsetY"),
          triggerClose: document.getElementById("triggerClose"),
          isMobile: document.getElementById("isMobile"),
          disabled: document.getElementById("disabled"),
          contentHtml: document.getElementById("contentHtml"),
          pickerTarget: document.getElementById("pickerTarget"),
          stateReady: document.getElementById("stateReady"),
          stateOpen: document.getElementById("stateOpen"),
          logList: document.getElementById("logList"),
          btnRebuild: document.getElementById("btnRebuild"),
          btnOpen: document.getElementById("btnOpen"),
          btnClose: document.getElementById("btnClose"),
          btnToggle: document.getElementById("btnToggle"),
          btnUpdate: document.getElementById("btnUpdate"),
          btnDestroy: document.getElementById("btnDestroy"),
        };

        function getForm() {
          return {
            placement: els.placement.value,
            trigger: els.trigger.value,
            triggerClose: !!els.triggerClose.checked,
            isMobile: !!els.isMobile.checked,
            disabled: !!els.disabled.checked,
            offsetX: Number(els.offsetX.value) || 0,
            offsetY: Number(els.offsetY.value) || 0,
            contentHtml: els.contentHtml.value,
          };
        }

        function pushLog(message) {
          var timestamp = new Date().toLocaleTimeString();
          logs.unshift("[" + timestamp + "] " + message);
          logs = logs.slice(0, 8);
          els.logList.innerHTML = logs
            .map(function (item) {
              return "<li>" + item + "</li>";
            })
            .join("");
        }

        function updateState() {
          els.stateReady.textContent = "picker: " + (picker ? "ready" : "destroyed");
          els.stateOpen.textContent = "open: " + (pickerOpen ? "true" : "false");
        }

        function destroyPicker() {
          if (!picker) {
            pickerOpen = false;
            updateState();
            return;
          }
          picker.destroy();
          picker = null;
          pickerOpen = false;
          updateState();
          pushLog("picker destroyed");
        }

        function rebuildPicker() {
          var form = getForm();
          destroyPicker();
          picker = new Picker(
            function () {
              return els.pickerTarget;
            },
            {
              placement: form.placement,
              trigger: form.trigger,
              triggerClose: form.triggerClose,
              isMobile: form.isMobile,
              offset: [form.offsetX, form.offsetY],
              content: form.contentHtml,
              onOpenChange: function (open) {
                pickerOpen = !!open;
                updateState();
                pushLog("onOpenChange -> " + !!open);
              },
            },
          );
          picker.disabled = form.disabled;
          window.picker = picker;
          updateState();
          pushLog("picker rebuilt");
        }

        els.btnRebuild.addEventListener("click", rebuildPicker);
        els.btnOpen.addEventListener("click", function (e) {
          e.stopPropagation();
          e.preventDefault();
          if (!picker) return;

          picker.open = true;
        });
        els.btnClose.addEventListener("click", function (e) {
          e.stopPropagation();
          e.preventDefault();
          if (!picker) return;
          picker.open = false;
        });
        els.btnToggle.addEventListener("click", function (e) {
          e.stopPropagation();
          e.preventDefault();
          if (!picker) return;
          picker.open = !picker.open;
        });
        els.btnUpdate.addEventListener("click", function () {
          if (!picker) return;
          picker.innerHTML(els.contentHtml.value);
          pushLog("content updated by innerHTML");
        });
        els.btnDestroy.addEventListener("click", destroyPicker);

        rebuildPicker();
      })();
    </script>
  </body>
</html>
