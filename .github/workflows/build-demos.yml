name: build-demos

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [16.x, 18.x, 19.x, 20.x, 21.x, 22.x, 23.x, 24.x, 25.x]

    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - uses: pnpm/action-setup@v5
        with:
          version: 8

      - name: Build with-react-ts
        working-directory: ./examples/with-react-ts
        run: |
          pnpm install
          pnpm run build

      - name: Build with-react17-ts
        working-directory: ./examples/with-react17-ts
        run: |
          pnpm install
          pnpm run build

      - name: Build with-react18-ts
        working-directory: ./examples/with-react18-ts
        run: |
          pnpm install
          pnpm run build
