<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Picker</title>
    <link rel="stylesheet" href="./common.css" />
    <link rel="stylesheet" href="./style/css.css" />
  </head>

  <body>
    <div class="app">
      <header class="demo-header">
        <div>
          <h1 class="demo-title">Picker Demo</h1>
          <p class="demo-subtitle">精简结构、统一样式、集中配置，便于快速验证各类定位与触发方式。</p>
        </div>
        <div class="demo-badges">
          <span class="demo-badge">Build: public/index.html</span>
          <span class="demo-badge">Device: <span id="device-status">Detecting</span></span>
        </div>
      </header>

      <main class="demo-main">
        <section class="demo-section">
          <h2>Container · Click</h2>
          <p>弹层挂载在目标元素内，点击触发。包含一个可销毁的实例。</p>
          <div class="demo-grid">
            <button id="container-top" class="demo-target" data-picker data-container="self" data-trigger="click" data-placement="top" data-label="Container / Top">Top</button>
            <button class="demo-target" data-picker data-container="self" data-trigger="click" data-placement="tl" data-label="Container / TL">TL</button>
            <button class="demo-target" data-picker data-container="self" data-trigger="click" data-placement="tr" data-label="Container / TR">TR</button>
            <button class="demo-target" data-picker data-container="self" data-trigger="click" data-placement="bottom" data-label="Container / Bottom">Bottom</button>
            <button class="demo-target" data-picker data-container="self" data-trigger="click" data-placement="bl" data-label="Container / BL">BL</button>
            <button class="demo-target" data-picker data-container="self" data-trigger="click" data-placement="br" data-label="Container / BR">BR</button>
          </div>
          <div class="demo-actions">
            <button class="demo-btn" id="destroy-container-top">Destroy “Top”</button>
          </div>
          <div class="demo-note">提示：销毁后可以刷新页面重新创建。</div>
        </section>

        <section class="demo-section">
          <h2>Container · Hover</h2>
          <p>Hover 触发 + 容器挂载，适合展示气泡式信息。</p>
          <div class="demo-grid">
            <button class="demo-target" data-picker data-container="self" data-trigger="hover" data-placement="top" data-label="Hover / Top">Hover Top</button>
            <button class="demo-target" data-picker data-container="self" data-trigger="hover" data-placement="tl" data-offset="0,-20" data-label="Hover / TL (-20)">Hover TL Offset -20</button>
            <button class="demo-target" data-picker data-container="self" data-trigger="hover" data-placement="tr" data-label="Hover / TR">Hover TR</button>
            <button class="demo-target" data-picker data-container="self" data-trigger="hover" data-placement="bottom" data-label="Hover / Bottom">Hover Bottom</button>
            <button class="demo-target" data-picker data-container="self" data-trigger="hover" data-placement="bl" data-label="Hover / BL">Hover BL</button>
            <button class="demo-target" data-picker data-container="self" data-trigger="hover" data-placement="br" data-label="Hover / BR">Hover BR</button>
          </div>
        </section>

        <section class="demo-section">
          <h2>Body · Hover</h2>
          <p>弹层挂载在 body，适合全局浮层使用场景。</p>
          <div class="demo-grid">
            <button class="demo-target" data-picker data-container="body" data-trigger="hover" data-placement="top" data-label="Body / Top">Body Top</button>
            <button class="demo-target" data-picker data-container="body" data-trigger="hover" data-placement="tl" data-label="Body / TL">Body TL</button>
            <button class="demo-target" data-picker data-container="body" data-trigger="hover" data-placement="tr" data-label="Body / TR">Body TR</button>
            <button class="demo-target" data-picker data-container="body" data-trigger="hover" data-placement="bottom" data-label="Body / Bottom">Body Bottom</button>
            <button class="demo-target" data-picker data-container="body" data-trigger="hover" data-placement="bl" data-label="Body / BL">Body BL</button>
            <button class="demo-target" data-picker data-container="body" data-trigger="hover" data-placement="br" data-label="Body / BR">Body BR</button>
          </div>
        </section>

        <section class="demo-section">
          <h2>Offset · Hover</h2>
          <p>偏移量示例：适合让气泡留出可视间距。</p>
          <div class="demo-row">
            <button class="demo-target" data-picker data-container="self" data-trigger="hover" data-placement="top" data-offset="0,-20" data-label="Container Offset (-20)">
              Container Offset -20
            </button>
            <button class="demo-target" data-picker data-container="body" data-trigger="hover" data-placement="top" data-offset="0,-20" data-label="Body Offset (-20)">Body Offset -20</button>
          </div>
        </section>
      </main>
    </div>
    <script src="./index.umd.js"></script>
    <script>
      (function () {
        const isMobile =
          (window &&
            /(phone|pad|pod|iPhone|iPod|ios|iPad|Android|Mobile|BlackBerry|IEMobile|MQQBrowser|JUC|Fennec|wOSBrowser|BrowserNG|WebOS|Symbian|Windows Phone|Opera Mini)/i.test(navigator.userAgent)) ||
          (/Macintosh/i.test(navigator.userAgent) && navigator.maxTouchPoints > 1);

        const statusEl = document.getElementById("device-status");
        if (statusEl) {
          statusEl.textContent = isMobile ? "Mobile" : "Desktop";
        }

        const popupContent = (label, placement) => {
          return `
            <div class="demo-popup">
              <div class="demo-popup-item">
                <div style="font-weight: 600; margin-bottom: 6px;">${label}</div>
                <div>Placement: ${placement}</div>
              </div>
              <div class="demo-popup-item">
                <div style="font-weight: 600; margin-bottom: 6px;">Tips</div>
                <div>Hover/click to preview</div>
              </div>
            </div>
          `;
        };

        const instances = new Map();

        const parseOffset = (value) => {
          if (!value) return null;
          const parts = value.split(",").map((item) => Number(item.trim()));
          if (parts.length !== 2 || parts.some(Number.isNaN)) {
            return null;
          }
          return parts;
        };

        const createPicker = (target) => {
          const placement = target.dataset.placement || "bottom";
          const trigger = target.dataset.trigger || "click";
          const container = target.dataset.container || "self";
          const label = target.dataset.label || target.textContent.trim();
          const offset = parseOffset(target.dataset.offset);
          const popupContainerId = target.dataset.popupContainerId;

          const options = {
            placement,
            trigger,
            wrapClassName: "demo-wrapper",
            isMobile,
          };

          if (popupContainerId) {
            options.getPopupContainer = () => document.getElementById(popupContainerId);
          } else if (container === "self") {
            options.getPopupContainer = () => target;
          }

          if (offset) {
            options.offset = offset;
          }

          const picker = new Picker(target, options);
          picker.innerHTML(popupContent(label, placement));
          instances.set(target.id || label, picker);
          return picker;
        };

        document.querySelectorAll("[data-picker]").forEach((el) => {
          createPicker(el);
        });

        const destroyBtn = document.getElementById("destroy-container-top");
        destroyBtn?.addEventListener("click", () => {
          const instance = instances.get("container-top");
          if (instance) {
            instance.destroy();
            instances.delete("container-top");
            destroyBtn.disabled = true;
            destroyBtn.textContent = "Destroyed";
          }
        });
      })();
    </script>
  </body>
</html>
